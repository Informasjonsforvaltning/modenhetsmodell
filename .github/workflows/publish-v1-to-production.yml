name: build adocs and publish v1 to production

permissions:
  contents: read
  security-events: write

on:
  push:
    branches:
      - v1
    paths:
      - docs/**
  workflow_dispatch:

jobs:
  adoc_build:
    runs-on: ubuntu-latest
    name: asciidoctor build

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: v1
          submodules: true
          fetch-depth: 0

      - name: Update submodules to latest main
        run: |
          git submodule foreach --recursive git fetch origin
          git submodule foreach --recursive git checkout origin/main

      - name: Build html
        id: adocbuild_html
        uses: Analog-inc/asciidoctor-action@master
        with:
          shellcommand: "asciidoctor -D docs -o index.html -a lang=nb docs/main.adoc"

      - name: Build pdf
        id: adocbuild_pdf
        uses: Analog-inc/asciidoctor-action@master
        with:
          shellcommand: "asciidoctor-pdf -D docs -o files/modenhetsmodell.pdf -a lang=nb docs/main.adoc"
        continue-on-error: true

      - name: Upload files to server
        uses: Informasjonsforvaltning/upload-files-to-static-rdf-server-action@84beeeacd364f310ef6a253bc079354cdf62e5dd
        id: upload-files
        with:
          ontology-type: "guide"
          ontology: "modenhetsmodell"
          host: "https://data.norge.no"
          api-key: ${{ secrets.STATIC_RDF_SERVER_API_KEY }}
          files: |
            docs/index.html text/html nb
            docs/files/modenhetsmodell.pdf application/pdf nb files/modenhetsmodell.pdf
            docs/files/modenhetsmodell-v1.xlsx application/vnd.openxmlformats-officedocument.spreadsheetml.sheet nb files/modenhetsmodell-v1.xlsx
            docs/images/Digdir.png image/png nb images/Digdir.png
            docs/images/illustrasjon-av-modenhetsmodellen.png image/png nb images/illustrasjon-av-modenhetsmodellen.png
