name: build adocs from develop and deploy to Github-pages

permissions:
  contents: write
  pages: write

on:
  push:
    branches:
      - develop
    paths:
      - docs/**

jobs:
  adoc_build:
    runs-on: ubuntu-20.04
    name: asciidoctor build
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: true
          fetch-depth: 0

      - name: Update submodules to latest main
        run: |
          git submodule foreach --recursive git fetch origin
          git submodule foreach --recursive git checkout origin/main

      - name: Build html
        id: adocbuild
        uses: Analog-inc/asciidoctor-action@master
        with:
          shellcommand: "asciidoctor -D docs -o index.html -a lang=nb docs/main.adoc"
      - name: Build pdf
        id: adocbuild_pdf
        uses: Analog-inc/asciidoctor-action@master
        with:
          shellcommand: "asciidoctor-pdf -D docs -o files/modenhetsmodell.pdf -a lang=nb docs/main.adoc"
        continue-on-error: true
      - name: Deploy
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

