name: build adocs from develop and deploy to Github-pages

permissions:
  contents: write

on:
  push:
    branches:
      - develop
    paths:
      - docs/**

jobs:
  build-adocs:
    name: asciidoctor build
    uses: Informasjonsforvaltning/workflows/.github/workflows/specification-github-pages.yaml@main
    with:
      program_html: |
        asciidoctor -D docs -o index.html -a lang=nb docs/main.adoc
      program_pdf: |
        asciidoctor-pdf -D docs -o files/modenhetsmodell.pdf -a lang=nb docs/main.adoc
      program_pdf_continue_on_error: true
      publish_branch: gh-pages
      publish_dir: ./docs
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
